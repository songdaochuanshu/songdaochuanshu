name: Trigger Fix Front Matter Script

# 控制工作流何时运行
on:
  workflow_dispatch: 

jobs:
  fix-front-matter:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18' 

    - name: Install dependencies
      run: npm ci 

    - name: Run fix-front-matter script
      run: node scripts/fix-front-matter.js