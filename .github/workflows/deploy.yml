name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: npx nuxt generate
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Debug output
        if: always()
        run: |
          echo "=== Generated files ==="
          ls -la dist/ 2>/dev/null || echo "no dist dir"
          test -f dist/index.html && echo "index.html exists" || echo "index.html MISSING"
          test -d dist/blog && echo "blog dir exists" || echo "blog dir MISSING"
          test -f dist/blog/index.html && echo "blog/index.html exists" || echo "blog/index.html MISSING"
          find dist -type f | head -30

      - name: Push to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.com"
          git checkout --orphan deploy
          git rm -rf .
          cp -r dist/* .
          git add -A
          git commit -m "deploy: $(date +'%Y-%m-%d %H:%M')"
          git push -f origin deploy
