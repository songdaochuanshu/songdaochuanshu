name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"  # Every day at 00:00 UTC (08:00 in CST)
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: pnpm run generate
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Debug output
        if: always()
        run: |
          echo "=== .output/public/ contents ==="
          find .output/public -type f | head -30
          echo ""
          echo "=== blog/ exists? ==="
          test -d .output/public/blog && echo "YES" || echo "NO"
          test -f .output/public/blog/index.html && echo "blog/index.html exists" || echo "blog/index.html MISSING"
          echo ""
          echo "=== index.html exists? ==="
          test -f .output/public/index.html && echo "index.html exists" || echo "index.html MISSING"

      - name: Push to dist branch for Cloudflare Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.com"
          git checkout --orphan dist
          git rm -rf .
          cp -r .output/public/* .
          git add -A
          git commit -m "deploy: $(date +'%Y-%m-%d %H:%M')"
          git push -f origin dist
